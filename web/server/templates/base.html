<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Proxyshop{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header>
    <h1><a href="/" class="brand">Proxyshop</a></h1>
    {% set path = request.url.path if request else '' %}
    <nav aria-label="Main">
      <a href="/" {% if path == '/' %}aria-current="page"{% endif %}>Editor</a>
      <a href="/gallery" {% if path.startswith('/gallery') or path.startswith('/card/') %}aria-current="page"{% endif %}>Card library</a>
      <a href="/decks" {% if path.startswith('/decks') %}aria-current="page"{% endif %}>Decks</a>
      <a href="/search" {% if path.startswith('/search') %}aria-current="page"{% endif %}>Search cards <span id="nav-cache-badge" class="nav-badge" hidden></span></a>
      <a href="/logs" {% if path.startswith('/logs') %}aria-current="page"{% endif %}>Logs</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {# Outside <main> so position:fixed isn't trapped by main's transform animation. #}
  <div class="card-modal" id="card-modal" hidden aria-modal="true" role="dialog" aria-labelledby="card-modal-title">
    <div class="card-modal-backdrop" data-modal-close tabindex="-1"></div>
    <div class="card-modal-dialog" role="document">
      <div class="card-modal-header">
        <h2 id="card-modal-title">Card</h2>
        <button type="button" class="card-modal-close" data-modal-close aria-label="Close">Close</button>
      </div>
      <div class="card-modal-body" id="card-modal-body">
        <p class="muted">Loading…</p>
      </div>
    </div>
  </div>
</body>
</html>
