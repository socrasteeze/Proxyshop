<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Proxyshop{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header>
    <h1><a href="/" class="brand">Proxyshop</a></h1>
    {% set path = request.url.path if request else '' %}
    <nav aria-label="Main">
      <a href="/" {% if path == '/' %}aria-current="page"{% endif %}>Editor</a>
      <a href="/gallery" {% if path.startswith('/gallery') or path.startswith('/card/') %}aria-current="page"{% endif %}>Card library</a>
      <a href="/decks" {% if path.startswith('/decks') %}aria-current="page"{% endif %}>Decks</a>
      <a href="/search" {% if path.startswith('/search') %}aria-current="page"{% endif %}>Search cards <span id="nav-cache-badge" class="nav-badge" hidden></span></a>
      <a href="/logs" {% if path.startswith('/logs') %}aria-current="page"{% endif %}>Logs</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
